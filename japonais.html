<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scapholène — Author's Site</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="b1">
	<a class="bouton" href="index.html"><h2 class="page-langue">🏠 ホーム</h2></a>
	<h1 id="nom">📘 Scapholène <span class="b1">(別名「須加歩蓮」)</span</h1>

	<h3>🚧 EN CONSTUCTION 🏗️</h3>
	<p class="phonetique avertissement">
		<canvas></canvas>
	</p>
<script>
let canvas = document.querySelector('canvas');
let context = canvas.getContext('2d');

let resize = () => {
  canvas.width = 370;
  canvas.height = 40;
}

window.addEventListener('resize', resize);

window.addEventListener('load', () => {

  resize();
  let pos, vel;
  pos = { x: 10, y: 10 };
  vel = { x: 1,  y: 1  };

  let loop = () => {
    context.clearRect(0, 0, canvas.width, canvas.height);
    pos.x += vel.x * 0.5 % canvas.width;
    pos.y += vel.y * 0.2 % canvas.height;

    if (pos.x < 5 || pos.x > canvas.width - 5)
      vel.x *= -1;

    if (pos.y < 5 || pos.y > canvas.height - 5)
      vel.y *= -1;

	context.strokeStyle = "#bb0b0b";
    context.strokeRect(pos.x - 5, pos.y - 5, 5, 4);

	context.fillStyle = "white";
	context.font = "14pt Shippori Mincho B1 bold";
    context.fillText("警告 [" + i + "] : この詩には論理的な誤りが含まれています. ämäjäkä o̞ɡämähä o̞hänäɕiänäho̞hä ämäɡo̞ äkäjämä [" + i * 7 % 19 + "]", chiffre(), canvas.height / 2);
  };

  setInterval(loop, 1000 / 60);
});

let plus = 600;
let i = canvas.width + plus;
let chiffre = () => {
  i--;
  if (i == -canvas.width - plus) i = canvas.width;
  return i;
}
</script>
</body>
</html>
